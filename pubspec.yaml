name: bayan_sulu_kids
description: "Bayan Sulu Kids - Educational mobile game for children featuring KamBot the camel"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  shared_preferences: ^2.3.4
  google_fonts: ^6.2.1
  model_viewer_plus: ^1.8.1
  http: ^1.2.0
  flutter_dotenv: ^5.2.1
  flutter_tts: ^4.2.0
  webview_flutter: ^4.10.0
  qr_flutter: ^4.1.0
  audioplayers: ^6.0.0
  speech_to_text: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/candies/
    - assets/catchgame/
    - assets/coin/
    - assets/cumbot/
    - assets/quiz/
    - assets/store/
    - assets/words/
    - assets/map/
    - assets/avatars/
    - assets/data/
    - assets/yurt/
